<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Polaris Agent</title>
<style>
:root{color-scheme:dark;--bg:#0b0e14;--sidebar:#0e1119;--card:#141822;--raised:#1a1f2e;--hover:#1e2436;--text:#e6e4df;--text2:#a09c94;--text3:#5c5850;--amber:#f0b860;--amber-s:rgba(240,184,96,.12);--amber-g:rgba(240,184,96,.2);--cyan:#5eeadb;--red:#e0554a;--green:#5cd68a;--purple:#a78bfa;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);--radius:12px;--radius-sm:8px;--font:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif;--mono:'SF Mono','JetBrains Mono','Cascadia Code',monospace;--ease:cubic-bezier(.22,1,.36,1);--spring:cubic-bezier(.34,1.56,.64,1)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14.5px;line-height:1.6;overflow:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 35% at 50% 45%,#f0b86005 0%,transparent 60%),radial-gradient(ellipse 20% 12% at 60% 18%,#5eeadb04 0%,transparent 40%),radial-gradient(ellipse 30% 18% at 35% 80%,#a78bfa03 0%,transparent 50%);pointer-events:none;z-index:0}
/* Layout */
.app{position:relative;z-index:1;display:flex;height:100vh;overflow:hidden}
/* Sidebar */
.sidebar{width:260px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:2}
.sidebar-header{padding:18px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sb-logo{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:12.5px;font-weight:700;letter-spacing:.08em}
.sb-logo svg{width:18px;height:18px;color:var(--amber)}
.sb-logo span{color:var(--amber)}
.sb-badge{font-size:9px;padding:2px 7px;border-radius:10px;background:var(--amber-s);color:var(--amber);font-family:var(--mono);letter-spacing:.06em}
.sessions{flex:1;overflow-y:auto;padding:8px}
.sessions::-webkit-scrollbar{width:3px}.sessions::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sess-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:background .15s;font-size:13px;color:var(--text2);margin-bottom:2px}
.sess-item:hover{background:var(--hover)}
.sess-item.active{background:var(--raised);color:var(--text)}
.sess-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.sess-item.active .sess-dot{background:var(--amber)}
.sess-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sess-date{font-size:10px;color:var(--text3);flex-shrink:0;font-family:var(--mono)}
.new-chat-btn{margin:8px;padding:9px;border-radius:10px;background:var(--card);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;font-family:var(--font)}
.new-chat-btn:hover{background:var(--raised);border-color:var(--amber);color:var(--amber)}
.sidebar-foot{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text3)}
.sf-status{display:flex;align-items:center;gap:6px}
.sf-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(92,214,138,.3)}
.sf-dot.off{background:var(--red);box-shadow:0 0 6px rgba(224,85,74,.3)}
/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.main-header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;z-index:1}
.mh-title{font-size:13px;font-weight:600;color:var(--text2);font-family:var(--mono);letter-spacing:.04em}
.mh-right{display:flex;align-items:center;gap:8px}
.strat-btn{font-family:var(--mono);font-size:10px;padding:4px 11px;border-radius:16px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--text3);transition:all .2s;letter-spacing:.04em}
.strat-btn:hover{border-color:var(--text2);color:var(--text2)}
.strat-btn.sel{font-weight:600;color:var(--cyan);border-color:var(--cyan);background:rgba(94,234,219,.08)}
.strat-btn.sel.c{color:var(--amber);border-color:var(--amber);background:var(--amber-s)}
.strat-btn.sel.e{color:var(--purple);border-color:var(--purple);background:rgba(167,139,250,.08)}
/* Chat */
.chat{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;gap:22px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:4px}.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;opacity:.35;padding:80px 24px;text-align:center}
.empty-logo{width:56px;height:56px;border-radius:50%;background:var(--amber-s);display:flex;align-items:center;justify-content:center;font-size:26px;animation:empty-breathe 4s ease-in-out infinite}
@keyframes empty-breathe{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.8;transform:scale(1.05)}}
.empty h2{font-size:19px;font-weight:500;letter-spacing:.02em}
.empty p{font-size:13px;color:var(--text2);max-width:420px;line-height:1.8}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;justify-content:center;max-width:460px}
.sug{font-size:12px;padding:7px 15px;border-radius:18px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all .18s;white-space:nowrap}
.sug:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-s);transform:translateY(-1px)}
/* Messages */
.msg-group{display:flex;flex-direction:column;gap:8px;animation:msg-in .35s var(--spring);opacity:0;animation-fill-mode:forwards}
@keyframes msg-in{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.user-bubble{align-self:flex-end;max-width:76%;background:var(--raised);padding:13px 18px;border-radius:var(--radius) var(--radius) 5px var(--radius);font-size:14px;border:1px solid var(--border);margin-left:auto;line-height:1.7}
/* Route Panel */
.route-panel{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:11px;animation:msg-in .3s ease}
.route-panel .itag{padding:3px 10px;border-radius:12px;background:rgba(94,234,219,.08);color:var(--cyan);border:1px solid rgba(94,234,219,.15);font-family:var(--mono);font-weight:600;letter-spacing:.04em}
.route-panel .itag.e{background:rgba(167,139,250,.08);color:var(--purple);border-color:rgba(167,139,250,.15)}
.route-panel .sep{color:var(--text3);opacity:.4}
.route-panel .mtag{padding:2px 9px;border-radius:10px;background:var(--amber-s);color:var(--amber);border:1px solid var(--amber-g);font-family:var(--mono);font-size:10px}
.route-panel .rationale{color:var(--text3);font-size:10px;flex-basis:100%;opacity:.7;line-height:1.5;margin-top:2px}
/* AI Bubble */
.ai-bubble{max-width:88%;padding:16px 22px;border-radius:5px var(--radius) var(--radius) var(--radius);background:var(--card);border:1px solid var(--border);font-size:14px;line-height:1.75;color:var(--text)}
.ai-bubble p{margin:0 0 10px}.ai-bubble p:last-child{margin-bottom:0}
.ai-bubble strong{color:var(--amber);font-weight:600}
.ai-bubble em{color:var(--text2)}
.ai-bubble h1,h2,h3{color:var(--text);margin:14px 0 6px;font-weight:600}
.ai-bubble h1{font-size:19px}h2{font-size:17px}h3{font-size:15px}
.ai-bubble code{background:var(--raised);padding:2px 7px;border-radius:5px;font-family:var(--mono);font-size:12px;color:var(--cyan);border:1px solid var(--border)}
.ai-bubble pre{background:#0c1119;padding:14px 18px;border-radius:var(--radius-sm);overflow-x:auto;margin:10px 0;font-size:12px;line-height:1.6;border:1px solid var(--border)}
.ai-bubble pre code{background:none;padding:0;color:var(--text);border:none}
.ai-bubble ul,.ai-bubble ol{margin:8px 0;padding-left:22px}
.ai-bubble li{margin-bottom:4px}
.ai-bubble blockquote{border-left:2px solid var(--amber);padding:4px 14px;color:var(--text2);font-style:italic;margin:8px 0}
.ai-bubble table{border-collapse:collapse;width:100%;margin:8px 0;font-size:13px}
.ai-bubble th,.ai-bubble td{border:1px solid var(--border);padding:6px 12px;text-align:left}
.ai-bubble th{background:var(--raised);font-weight:600;color:var(--amber)}
.ml{font-family:var(--mono);font-size:9px;color:var(--text3);opacity:.5;margin-bottom:6px;letter-spacing:.08em}
.model-labels{display:flex;gap:6px;margin-bottom:8px}
.model-label-tag{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:10px;background:var(--amber-s);color:var(--amber);border:1px solid var(--amber-g)}
/* Streaming states */
.stream-row{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:12px;color:var(--amber);font-family:var(--mono)}
.stream-dots{display:flex;gap:4px}.stream-dots span{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:dot-wave 1.2s ease-in-out infinite}
.stream-dots span:nth-child(2){animation-delay:.15s}.stream-dots span:nth-child(3){animation-delay:.3s}
@keyframes dot-wave{0%,80%,100%{opacity:.2;transform:scale(.7)}40%{opacity:1;transform:scale(1.4)}}
.thinking-block{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--amber-s);border:1px solid rgba(240,184,96,.1);border-radius:var(--radius-sm);font-size:11px;color:var(--amber);animation:msg-in .3s ease}
.thinking-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);animation:dot-wave 1.6s ease-in-out infinite;flex-shrink:0}
/* Input */
.input-bar{display:flex;gap:12px;padding:16px 24px 20px;align-items:flex-end;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0;position:relative;z-index:1}
.input-bar textarea{flex:1;resize:none;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;font-size:14px;line-height:1.6;font-family:var(--font);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;max-height:150px}
.input-bar textarea:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(240,184,96,.08)}
.input-bar textarea::placeholder{color:var(--text3);opacity:.6}
.send-btn{width:44px;height:44px;border-radius:50%;border:none;background:var(--amber);color:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:18px;font-weight:700}
.send-btn:hover:not(:disabled){transform:scale(1.06);box-shadow:0 0 28px rgba(240,184,96,.3)}
.send-btn:active:not(:disabled){transform:scale(.94)}
.send-btn:disabled{opacity:.2;cursor:default;transform:none;box-shadow:none}
.send-btn svg{width:18px;height:18px}
.voice-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.voice-btn:hover{border-color:var(--amber);color:var(--amber)}
.voice-btn svg{width:16px;height:16px}
/* Pulse */
.pulse{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 6px var(--amber),0 0 16px rgba(240,184,96,.4);transition:all .4s;flex-shrink:0}
.pulse.think{background:var(--cyan);box-shadow:0 0 10px var(--cyan),0 0 22px rgba(94,234,219,.4);animation:pulse-breathe .9s ease-in-out infinite}
.pulse.ens{background:var(--purple);box-shadow:0 0 8px var(--purple),0 0 18px rgba(167,139,250,.4)}
@keyframes pulse-breathe{0%,100%{opacity:.35;transform:scale(.85)}50%{opacity:1;transform:scale(1.2)}}
/* Ensemble card */
.ensemble-card{margin-top:12px;padding:12px 16px;background:var(--raised);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--mono);font-size:11px}
.ens-consensus{font-weight:700;margin-bottom:6px}
.ens-consensus.high{color:var(--green)}.ens-consensus.medium{color:var(--amber)}.ens-consensus.low{color:var(--red)}
/* Responsive */
@media(max-width:700px){.sidebar{display:none}.chat{padding:16px}.input-bar{padding:12px 16px 16px}}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sb-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 2v4l3-2-3 4m0 8v4l-3-2 3-4m6-2l-2-3 4 3m-8 6l-2-3-4 3"/></svg>
        <span>POLARIS</span>
      </div>
      <div class="sb-badge">AGENT</div>
    </div>
    <button class="new-chat-btn" onclick="newSession()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
      新对话
    </button>
    <div class="sessions" id="sessions"><div class="sess-item active"><div class="sess-dot"></div><div class="sess-name">当前对话</div><div class="sess-date">now</div></div></div>
    <div class="sidebar-foot"><div class="sf-status"><div class="sf-dot" id="sf-dot"></div><span id="sf-text">在线</span></div><span id="sid-display"></span></div>
  </div>
  <!-- Main -->
  <div class="main" id="main">
    <div class="main-header">
      <div class="mh-title">
        <div class="pulse" id="pulse" style="display:inline-block;vertical-align:middle;margin-right:8px"></div>
        Polaris Agent — 模型路由器
      </div>
      <div class="mh-right">
        <button class="strat-btn sel" id="s-quality" onclick="setStrategy('best_quality')">最佳质量</button>
        <button class="strat-btn" id="s-cost" onclick="setStrategy('cost_optimized')">成本优先</button>
        <button class="strat-btn" id="s-ensemble" onclick="setStrategy('ensemble')">多模型协同</button>
      </div>
    </div>
    <div class="chat" id="chat">
      <div class="empty" id="empty">
        <div class="empty-logo">✦</div>
        <h2>Polaris — 您的桌面AI代理</h2>
        <p>任何问题，Polaris 都会自动选择最合适的 AI 模型来回答。试试看：</p>
        <div class="suggestions">
          <div class="sug" onclick="sendSuggestion('用Python写一个多线程下载器，支持断点续传，要有完整的错误处理')">写一个多线程下载器</div>
          <div class="sug" onclick="sendSuggestion('帮我写一封给投资人的项目介绍邮件，语气专业但不失热情')">写投资人邮件</div>
          <div class="sug" onclick="sendSuggestion('最近压力很大，帮我从心理学角度分析一下原因和解决方案')">压力分析建议</div>
          <div class="sug" onclick="sendSuggestion('用简单的语言解释量子计算的基本原理')">量子计算科普</div>
        </div>
      </div>
    </div>
    <div class="input-bar">
      <button class="voice-btn" title="语音输入（即将支持）"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="6" y="1" width="4" height="9" rx="2"/><path d="M4 7a4 4 0 008 0"/><line x1="8" y1="13" x2="8" y2="16"/><line x1="4" y1="16" x2="12" y2="16"/></svg></button>
      <textarea id="input" rows="1" placeholder="Polaris，帮我..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendQuery()}"></textarea>
      <button class="send-btn" id="send" onclick="sendQuery()"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 2l12 5.5L2 14l3-6.5L2 2z"/></svg></button>
    </div>
  </div>
</div>

<script>
const API='http://localhost:8026';let sessionId='';let strategy='best_quality';let streaming=false;let sessions=[{id:'current',name:'当前对话',active:true}];

async function init(){try{const r=await fetch(API+'/api/session',{method:'POST',body:new URLSearchParams({strategy})});const d=await r.json();sessionId=d.session_id;document.getElementById('sid-display').textContent='#'+sessionId.slice(0,8);checkHealth();setInterval(checkHealth,15000)}catch(e){sessionId='local-'+Date.now();document.getElementById('sf-text').textContent='离线';document.getElementById('sf-dot').classList.add('off')}}
async function checkHealth(){try{const r=await fetch(API+'/api/health');if(r.ok){document.getElementById('sf-text').textContent='在线';document.getElementById('sf-dot').classList.remove('off');document.getElementById('pulse').classList.remove('think','ens')}}catch(e){document.getElementById('sf-text').textContent='离线';document.getElementById('sf-dot').classList.add('off')}}
init();

function setStrategy(s){strategy=s;['quality','cost','ensemble'].forEach(k=>{const el=document.getElementById('s-'+k);el.classList.toggle('sel',k===s);if(k==='cost')el.classList.toggle('c',k===s);if(k==='ensemble')el.classList.toggle('e',k===s)});document.getElementById('pulse').classList.toggle('ens',s==='ensemble')}

function sendSuggestion(t){document.getElementById('input').value=t;sendQuery()}
function newSession(){location.reload()}

async function sendQuery(){
  if(streaming)return;const input=document.getElementById('input');const text=input.value.trim();if(!text)return;input.value='';input.style.height='auto';streaming=true;document.getElementById('send').disabled=true;
  const empty=document.getElementById('empty');if(empty)empty.style.display='none';
  const chat=document.getElementById('chat');
  const pulse=document.getElementById('pulse');pulse.classList.add('think');

  // User bubble
  const ug=div('msg-group');ug.innerHTML='<div class="user-bubble">'+esc(text)+'</div>';chat.appendChild(ug);
  // Route placeholder
  const rg=div('msg-group');rg.innerHTML='<div class="route-panel"><span class="itag">分析中...</span></div>';chat.appendChild(rg);
  // AI response
  const ag=div('msg-group');
  const mlRow=div('model-labels');ag.appendChild(mlRow);
  const ab=div('ai-bubble');ag.appendChild(ab);
  chat.appendChild(ag);
  // Stream + thinking
  const streamEl=div('stream-row');streamEl.innerHTML='<span>✦ 思考中</span><div class="stream-dots"><span></span><span></span><span></span></div>';chat.appendChild(streamEl);
  const think=div('thinking-block');think.innerHTML='<div class="thinking-dot"></div><span>正在分析意图…</span>';chat.appendChild(think);
  chat.scrollTop=chat.scrollHeight;

  try{
    const fd=new URLSearchParams({text,session_id:sessionId,strategy});const resp=await fetch(API+'/api/query',{method:'POST',body:fd});const data=await resp.json();
    const route=data.routing;
    // Route panel
    const intentTag=route.top_intent||'general';const isEns=route.selected_models&&route.selected_models.length>1;
    rg.innerHTML='<div class="route-panel">'+
      '<span class="itag'+(isEns?' e':'')+'">'+intentTag+'</span>'+
      '<span class="sep">→</span>'+
      (route.selected_models||[]).map(function(m){return'<span class="mtag">'+m+'</span>'}).join(' ')+
      '<span class="sep">·</span><span style="color:var(--text3)">'+route.strategy+'</span>'+
      (route.rationale?'<div class="rationale">'+route.rationale+'</div>':'')+
      '</div>';
    // Model labels
    mlRow.innerHTML=(route.selected_models||[]).map(function(m){return'<span class="model-label-tag">'+m+'</span>'}).join('');
    // Update thinking
    think.innerHTML='<div class="thinking-dot"></div><span>已选择: '+(route.selected_models||[]).join(', ')+' · 等待回复…</span>';
    pulse.classList.remove('think');if(isEns)pulse.classList.add('ens');
    // Fill response
    const responses=data.responses||[];
    if(responses.length>0){
      var content='';
      if(responses.length===1){content=responses[0].content||''}else{
        content=responses.map(function(r){return'**▸ '+(r.model_display||r.model_id)+'**\n\n'+(r.content||'')}).join('\n\n---\n\n')
      }
      ab.innerHTML=renderMD(content);
      // Ensemble report
      if(data.ensemble){var rep=data.ensemble;var cl=rep.consensus_level||'n/a';
        ab.innerHTML+='<div class="ensemble-card"><div class="ens-consensus '+(cl==='high'?'high':cl==='medium'?'medium':'low')+'">● 共识级别: '+cl.toUpperCase()+'</div>'+(rep.summary||'')+'</div>'
      }
    }
    think.innerHTML='<div class="thinking-dot" style="background:var(--green);animation:none"></div><span style="color:var(--green)">完成 · '+(data.total_latency_ms||0)+'ms</span>';
    pulse.classList.remove('ens');document.getElementById('sf-dot').classList.remove('off');
    setTimeout(function(){think.style.opacity='0';think.style.transition='opacity .5s';setTimeout(function(){think.remove()},500)},2500)
  }catch(err){ab.innerHTML='<span style="color:var(--red)">连接失败: '+esc(err.message)+'</span><br/><span style="color:var(--text3);font-size:12px">请启动后端: python -m src.server</span>';think.innerHTML='<span style="color:var(--red)">✗ 连接失败</span>';pulse.classList.remove('think','ens');document.getElementById('sf-dot').classList.add('off');document.getElementById('sf-text').textContent='离线'}finally{streaming=false;document.getElementById('send').disabled=false;streamEl.remove();chat.scrollTop=chat.scrollHeight}
}

function div(c){var d=document.createElement('div');d.className=c;return d}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function renderMD(t){
  var h=esc(t);
  h=h.replace(/```(\w*)\n([\s\S]*?)```/g,function(_,lang,code){return'<pre><code>'+code.trim()+'</code></pre>'});
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h=h.replace(/^### (.+)/gm,'<h3>$1</h3>');
  h=h.replace(/^## (.+)/gm,'<h2>$1</h2>');
  h=h.replace(/^# (.+)/gm,'<h1>$1</h1>');
  h=h.replace(/^[-*] (.+)/gm,'<li>$1</li>');
  h=h.replace(/((?:<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>');
  h=h.replace(/^\d+\. (.+)/gm,'<li>$1</li>');
  h=h.replace(/^> (.+)/gm,'<blockquote>$1</blockquote>');
  h=h.replace(/\n\n/g,'</p><p>');
  h=h.replace(/\n/g,'<br/>');
  h='<p>'+h+'</p>';
  h=h.replace(/<p>\s*<\/p>/g,'');
  return h
}
</script>
